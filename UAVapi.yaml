openapi: 3.0.3
info:
  title: 无人机道路病害检测系统 API
  description: |
    这是《无人机道路病害检测》大创项目的核心后端 API 文档。
    
    **【特别说明：WebSocket 实时遥测通道】**
    * **协议地址**: `ws://<服务器IP>:8080/ws/telemetry`
    * **作用**: 无人机每 100ms 发送一次经纬度到此通道，前端需连接此通道并监听，获取数据后直接使用 `droneMarker.setPosition()` 渲染动画，**请勿将高频数据绑定到 Vue 响应式变量中**以防卡顿。
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: 本地开发环境
tags:
  - name: Map
    description: 地图与病害渲染模块
  - name: Drone
    description: 无人机设备管理与数据上报模块
  - name: Task
    description: 巡检任务管理模块

paths:
  /api/v1/map/defects:
    get:
      tags:
        - Map
      summary: 获取视口内的病害点
      description: 拖拽/缩放地图时调用。根据缩放等级返回简略或详细的病害点信息，防止前端海量点渲染卡顿。
      parameters:
        - name: minLng
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: minLat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: maxLng
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: maxLat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: zoom
          in: query
          required: true
          schema:
            type: integer
          description: 当前地图缩放等级 (zoom<14时通常只返回经纬度和权重，不返回详情)
      responses:
        '200':
          description: 成功获取视口病害点
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefectPointResponse'

  /api/v1/drones:
    get:
      tags:
        - Drone
      summary: 获取无人机列表
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DroneListResponse'
    post:
      tags:
        - Drone
      summary: 添加无人机
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                droneName:
                  type: string
                  example: Mavic-3-测试机
      responses:
        '200':
          description: 添加成功

  /api/v1/drones/upload:
    post:
      tags:
        - Drone
      summary: 无人机抓拍图片与位置上报
      description: 接收无人机传来的图片及GPS，后端将调用Python AI接口进行识别并存库。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                taskId:
                  type: integer
                  format: int64
                droneId:
                  type: integer
                  format: int64
                lng:
                  type: number
                  format: double
                lat:
                  type: number
                  format: double
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 上传并处理成功

  /api/v1/tasks:
    get:
      tags:
        - Task
      summary: 获取巡检任务列表
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: integer
          description: 0-未开始, 1-执行中, 2-已完成。不传则获取所有。
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
    post:
      tags:
        - Task
      summary: 创建巡检任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                taskName:
                  type: string
                  example: 南区主干道巡检
                droneId:
                  type: integer
                  format: int64
                  example: 1
                routePoints:
                  type: string
                  description: 前端绘制的航点JSON字符串
                  example: '[{"lng":116.3,"lat":39.9}, {"lng":116.4,"lat":39.8}]'
      responses:
        '200':
          description: 创建成功

  /api/v1/tasks/{id}/start:
    put:
      tags:
        - Task
      summary: 开始任务
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 任务已开始

  /api/v1/tasks/{id}:
    delete:
      tags:
        - Task
      summary: 删除未开始的任务
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功
  /api/v1/drones/telemetry:
    post:
      tags:
        - Drone
      summary: 模拟器上报接口
      description: Python 模拟脚本调用此接口发送高频坐标，后端不落库，直接通过 WebSocket 转发给前端渲染动画。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                taskId:
                  type: integer
                  format: int64
                  example: 10
                droneId:
                  type: integer
                  format: int64
                  example: 1
                lng:
                  type: number
                  format: double
                  example: 116.39123
                lat:
                  type: number
                  format: double
                  example: 39.90456
                heading:
                  type: number
                  format: double
                  example: 85.5
      responses:
        '200':
          description: 成功推送到 WebSocket

  /api/v1/tasks/{id}/finish:
    put:
      tags:
        - Task
      summary: 任务完成接口
      description: 模拟脚本飞完所有航点后调用，更新任务状态并统计病害总数。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 任务ID
      responses:
        '200':
          description: 任务结束

components:
  schemas:
    DefectPointResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              lng:
                type: number
                format: double
              lat:
                type: number
                format: double
              weight:
                type: integer
                description: 该点病害数量
                example: 3
              type:
                type: string
                example: crack
              imageUrl:
                type: string
                example: http://localhost:8080/results/xyz.jpg
    DroneListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              droneName:
                type: string
              status:
                type: integer
                description: 0-空闲, 1-执行中
    TaskListResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              taskName:
                type: string
              status:
                type: integer
              droneName:
                type: string
              routePoints:
                type: string
              createTime:
                type: string
              defectCount:
                type: integer
              finishTime:
                type: string