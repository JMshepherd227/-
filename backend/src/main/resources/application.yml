server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/drone_inspection?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: asdf520520.
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  web:
    resources:
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:D:/work(work only)/python/UAVRoadDetection/result/

  data:
    redis:
      host: localhost  # Redis 服务器地址
      port: 6379       # Redis 端口
      # password: your_password # 如果你的 Redis 设置了密码
      database: 0      # 使用 0 号数据库
      lettuce:
        pool:
          max-active: 8 # 最大连接数
          max-wait: -1ms # 连接池最大阻塞等待时间（-1 表示没有限制）
          max-idle: 8    # 最大空闲连接
          min-idle: 0    # 最小空闲连接

  task:
    execution:
      pool:
        core-size: 4          # 核心线程数，建议与 CPU 核数相同
        max-size: 8           # 最大线程数
        queue-capacity: 100   # 队列容量，防止任务堆积导致 OOM
        keep-alive: 60s
      thread-name-prefix: ai-task-

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      table-underline: true

drone:
  # Linux / 生产环境
  # origin-dir: /data/uav/origin
  # Windows 本地开发（取消注释后使用）
  origin-dir: D:\work(work only)\python\UAVRoadDetection/origin

  # Python AI 推理服务地址
  ai-url: http://localhost:8000/predict/

  ai-timeout-ms: 10000

